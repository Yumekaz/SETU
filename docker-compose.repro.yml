services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
      args:
        REQUIREMENTS_FILE: backend/requirements-docker.txt
        APP_MODULE: app.main_repro:app
    ports:
      - "8000:8000"
    volumes:
      - setu-data:/data
      - ./schemas:/schemas:ro
    environment:
      - DATABASE_URL=sqlite:////data/setu.db
      - SCHEMAS_DIR=/schemas
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  setu-data: