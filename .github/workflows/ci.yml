name: CI

on:
  push:
    branches: [main, "phase-0/**", "phase-*/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate models from schemas
        run: python scripts/generate_models.py

      - name: Generate mock fixtures
        run: python scripts/generate_mocks.py

      - name: Schema & health tests
        run: pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Type-check frontend
        working-directory: frontend
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Generate fixtures for frontend build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python scripts/generate_models.py
          python scripts/generate_mocks.py

      - name: Build Docker images
        run: docker compose build